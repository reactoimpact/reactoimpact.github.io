<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reacto</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }

        .main {
            flex-grow: 2;
        }

        .navbar {
            background: linear-gradient(red, blue);
            display: flex;
            flex-direction: column;
            background-color: wheat;
            padding-bottom: 100%;
        }

        header {
            background: linear-gradient(45deg, blue, red);
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        a {
            text-decoration: none;
            color: #fff;
            padding: 20px;
            width: 100%;
        }
        a:hover {
            background-color: rgb(255, 74, 74);
        }

        .content {
            flex-grow: 1;
            padding: 20px;
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="main">
        <header>
            <h1>Welcome to My Website</h1>
        </header>

        

        <div class="content">
            <h2>Main Content</h2>
            <p>This is the main content of the page.</p>
        </div>

        <footer>
            <p>&copy; 2023 My Website</p>
        </footer>
    </div>

    
    <div class="navbar">
        <a href="#">About Me</a>
        <a href="#">Projects</a>
        <a href="#">Blog</a>
    </div>
</body>
</html>
